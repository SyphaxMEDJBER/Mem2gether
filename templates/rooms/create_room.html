{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="container py-5">
    <div class="room-create-card mx-auto">
        <p class="room-create-kicker">Espace professeur</p>
        <h2 class="text-center mb-3">Créer une room</h2>
        <p class="room-create-text text-center">
            Lancez une nouvelle session pour partager vos supports avec vos élèves.
        </p>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{% url 'create_room' %}">
            {% csrf_token %}

            <button class="btn btn-primary w-100 py-2">
                Créer une nouvelle room
            </button>
        </form>
    </div>

</div>

{% endblock %}
